<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.2);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
}

/* Container */
.container{
width:90%;
max-width:1000px;
margin:auto;
margin-top:30px;
}

/* Heading */
h1{
text-align:center;
margin-bottom:30px;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
color:#333;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card i{
font-size:30px;
margin-bottom:10px;
color:#2a5298;
}

.card h3{
margin:10px 0;
}

/* Progress Bar */
.progress-box{
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:30px;
}

.progress-bar{
background:#28a745;
padding:12px;
text-align:center;
color:white;
font-weight:bold;
}

/* Footer */
.footer{
text-align:center;
margin-top:40px;
opacity:0.8;
}

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
<h2>📘 GyanaGhar</h2>

<div>
<a href="/dashboard">Home</a>
<a href="/logout">Logout</a>
</div>
</div>

<!-- Main -->
<div class="container">

<h1>📊 Your Learning Dashboard</h1>

<div class="cards">

<div class="card">
<i class="fa fa-book"></i>
<h3>Total Notes</h3>
<p>{{ total_notes }}</p>
</div>

<div class="card">
<i class="fa fa-check-circle"></i>
<h3>Completed</h3>
<p>{{ completed_notes }}</p>
</div>

<div class="card">
<i class="fa fa-chart-line"></i>
<h3>Progress</h3>
<p>{{ progress }}%</p>
</div>

</div>

<!-- Progress Bar -->
<div class="progress-box">
<div class="progress-bar" style="width:{{ progress }}%;">
{{ progress }}% Completed
</div>
</div>

</div>

<!-- Footer -->
<div class="footer">
© 2026 GyanaGhar | Built by Rahul Nayak 🚀
</div>

</body>
</html>
