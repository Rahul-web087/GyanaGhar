<!DOCTYPE html>
<html>
<head>

<title>Edit Chapter - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#1e3c72;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.container{
width:90%;
max-width:500px;
margin:auto;
margin-top:60px;
}

.card{
background:white;
color:#333;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="navbar">
<h2>GyanaGhar</h2>

<div>
<a href="/dashboard">Home</a>
<a href="/logout">Logout</a>
</div>
</div>

<div class="container">

<div class="card">

<h2>✏ Edit Chapter</h2>

<form method="POST">

<!-- Class -->
<label>Select Class</label>
<select id="classSelect" required>

{% for c in classes %}
<option value="{{ c.id }}"
{% if c.id == current_class_id %} selected {% endif %}>
{{ c.name }}
</option>
{% endfor %}

</select>

<!-- Subject -->
<label>Select Subject</label>
<select name="subject_id" id="subjectSelect" required>

{% for s in subjects %}
<option value="{{ s.id }}" data-class="{{ s.class_id }}"
{% if s.id == chapter.subject_id %} selected {% endif %}>
{{ s.name }}
</option>
{% endfor %}

</select>

<!-- Chapter Name -->
<label>Chapter Name</label>
<input type="text" name="name" value="{{ chapter.name }}" required>

<button type="submit">
Update Chapter
</button>

</form>

</div>

</div>

<!-- ✅ Dynamic Filter JS -->
<script>
const classSelect = document.getElementById("classSelect");
const subjectSelect = document.getElementById("subjectSelect");

function filterSubjects() {
    let classId = classSelect.value;

    for (let option of subjectSelect.options) {
        if (option.dataset.class == classId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }
}

classSelect.addEventListener("change", filterSubjects);

// run once on page load
window.onload = filterSubjects;
</script>

</body>
</html>
