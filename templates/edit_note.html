<!DOCTYPE html>
<html>
<head>
<title>Edit Note</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
width:90%;
max-width:500px;
margin:auto;
margin-top:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#2a5298;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>✏ Edit Note</h2>

<form method="POST" enctype="multipart/form-data">

<label>Title</label>
<input type="text" name="title" value="{{ note.title }}" required>

<label>Content</label>
<textarea name="content">{{ note.content }}</textarea>

<label>Video Link</label>
<input type="text" name="video_link" value="{{ note.video_link }}">

<!-- Show old PDF -->
{% if note.pdf_file %}
<p>Current PDF:</p>
<a href="/static/uploads/{{ note.pdf_file }}" target="_blank">
📄 View PDF
</a>
{% endif %}

<label>Replace PDF</label>
<input type="file" name="pdf_file">

<button type="submit">Update Note</button>

</form>

</div>

</div>

</body>
</html>
