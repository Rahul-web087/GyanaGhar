<!DOCTYPE html>
<html>
<head>

<title>Admin Analytics - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#1e3c72;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.navbar a:hover{
text-decoration:underline;
}


/* CONTAINER */

.container{
width:90%;
margin:auto;
margin-top:40px;
text-align:center;
}


/* GRID */

.stats-grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
}


/* CARD */

.card{
background:white;
color:#333;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin:10px 0;
font-size:40px;
color:#1e3c72;
}

.card p{
font-size:18px;
}


/* FOOTER */

footer{
margin-top:60px;
padding:20px;
background:#1e3c72;
text-align:center;
}

</style>

</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<h2>GyanaGhar Admin</h2>

<div>

<a href="/dashboard">Dashboard</a>

<a href="/logout">Logout</a>

</div>

</div>



<div class="container">

<h1>📊 Platform Analytics</h1>

<p>Overview of GyanaGhar learning platform</p>


<div class="stats-grid">

<div class="card">

<h2>{{ users }}</h2>

<p>Total Students</p>

</div>


<div class="card">

<h2>{{ classes }}</h2>

<p>Total Classes</p>

</div>


<div class="card">

<h2>{{ subjects }}</h2>

<p>Total Subjects</p>

</div>


<div class="card">

<h2>{{ chapters }}</h2>

<p>Total Chapters</p>

</div>


<div class="card">

<h2>{{ notes }}</h2>

<p>Total Notes</p>

</div>


</div>

</div>


<footer>

© 2026 GyanaGhar | Built by Rahul Nayak

</footer>


</body>
</html>
