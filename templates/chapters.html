<!DOCTYPE html>
<html>
<head>

<title>Chapters - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}

.navbar a:hover{
color:#ff4d4d;
}

/* MAIN */

.container{
width:90%;
margin:auto;
margin-top:40px;
text-align:center;
}

.section-title{
font-size:26px;
margin-bottom:30px;
}

/* GRID */

.chapter-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */

.chapter-card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.chapter-card:hover{
transform:translateY(-10px) scale(1.03);
background:rgba(255,0,0,0.2);
}

.chapter-card h3{
margin-bottom:15px;
}

/* BUTTON */

.chapter-btn{
display:inline-block;
padding:10px 22px;
background:#ff4d4d;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.chapter-btn:hover{
background:#e60000;
}

/* BACK */

.back{
margin-top:40px;
display:inline-block;
padding:10px 25px;
background:#ff4d4d;
border-radius:8px;
text-decoration:none;
color:white;
transition:0.3s;
}

.back:hover{
background:#e60000;
}

/* FOOTER */

footer{
margin-top:70px;
padding:20px;
background:rgba(255,255,255,0.05);
text-align:center;
}

</style>

</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="{{ url_for('static', filename='gyanagharlogo.png') }}">
<h2>GyanaGhar 🚀</h2>
</div>

<div>
<a href="/dashboard">Home</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>
</div>

</div>



<div class="container">

<h2 class="section-title">📖 Chapters</h2>

<div class="chapter-grid">

{% for chapter in chapters %}

<div class="chapter-card">

<h3>{{ chapter.name }}</h3>

<a class="chapter-btn" href="/chapter/{{ chapter.id }}">
Open Chapter
</a>

</div>

{% endfor %}

</div>

<br>

<a class="back" href="/dashboard">⬅ Back to Dashboard</a>

</div>


<footer>
© 2026 GyanaGhar | Built by Rahul Nayak
</footer>

</body>
</html>
