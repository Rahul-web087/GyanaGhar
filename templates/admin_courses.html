<!DOCTYPE html>
<html>
<head>

<title>Manage Courses</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<h1>Manage Courses</h1>

<a href="/dashboard">Dashboard</a>
<a href="/logout">Logout</a>

</div>

<div class="container">

<h3>Course List</h3>

<table border="1" width="100%" style="background:white">

<tr>
<th>Class</th>
<th>Subject</th>
<th>Chapter</th>
<th>Action</th>
</tr>

{% for course in courses %}

<tr>
<td>{{ course.class_name }}</td>
<td>{{ course.subject_name }}</td>
<td>{{ course.chapter_name }}</td>

<td>

<a href="/admin/edit_chapter/{{ course.chapter_id }}">Edit Chapter Name</a>


<a href="{{ url_for('delete_course', chapter_id=course.chapter_id) }}"
onclick="return confirm('Are you sure you want to delete this course?')">
Delete
</a>

<a href="/admin/edit_note/{{ course.chapter_id }}">Edit Note</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
