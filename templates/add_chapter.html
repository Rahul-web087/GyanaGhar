<!DOCTYPE html>
<html>
<head>
<title>Add Chapter - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* Sidebar */
.sidebar{
width:220px;
height:100vh;
background:#1e3c72;
color:white;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#2a5298;
}

/* Main */
.main{
margin-left:220px;
padding:30px;
width:100%;
background:#f5f5f5;
min-height:100vh;
}

/* Form */
.form-card{
background:white;
padding:30px;
border-radius:12px;
max-width:450px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.form-card h2{
text-align:center;
margin-bottom:20px;
}

.form-card input,
.form-card select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.form-card button{
margin-top:20px;
width:100%;
padding:12px;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.form-card button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<h2>📘 GyanaGhar</h2>

<a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
<a href="/admin/courses"><i class="fa fa-book"></i> Courses</a>
<a href="/admin/add_subject"><i class="fa fa-layer-group"></i> Subjects</a>
<a href="/admin/add_chapter"><i class="fa fa-list"></i> Chapters</a>
<a href="/admin/add_note"><i class="fa fa-file"></i> Notes</a>
<a href="/admin/analytics"><i class="fa fa-chart-line"></i> Analytics</a>
<a href="/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>

</div>

<!-- Main Content -->
<div class="main">

<div class="form-card">

<h2>📘 Add Chapter</h2>

<form method="POST">

<!-- Class -->
<label>Select Class</label>
<select id="classSelect" required>

<option value="">Select Class</option>

{% for c in classes %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}

</select>

<!-- Subject -->
<label>Select Subject</label>
<select name="subject_id" id="subjectSelect" required>

<option value="">Select Subject</option>

{% for s in subjects %}
<option value="{{ s.id }}" data-class="{{ s.class_id }}">
{{ s.name }}
</option>
{% endfor %}

</select>

<!-- Chapter Name -->
<label>Chapter Name</label>
<input type="text" name="name" placeholder="Enter Chapter Name" required>

<button type="submit">Add Chapter</button>

</form>

</div>

</div>

<!-- JS for filtering -->
<script>
const classSelect = document.getElementById("classSelect");
const subjectSelect = document.getElementById("subjectSelect");

classSelect.addEventListener("change", function () {
    let classId = this.value;

    for (let option of subjectSelect.options) {
        if (option.dataset.class == classId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }

    subjectSelect.value = "";
});
</script>

</body>
</html>
