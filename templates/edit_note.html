<!DOCTYPE html>

<html>
<head>
<title>Edit Note</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#2a5298;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.qa-item{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>✏ Edit Note</h2>

<form method="POST" enctype="multipart/form-data">

<label>Title</label> <input type="text" name="title" value="{{ note.title }}" required>

<!-- MULTIPLE Q&A -->

<div id="qa-container">

{% if note.qa_data %}
{% set qa_list = note.qa_data | from_json %}


{% for qa in qa_list %}
<div class="qa-item">
    <label>Question</label>
    <textarea name="question[]" required>{{ qa.question }}</textarea>

    <label>Answer</label>
    <textarea name="answer[]" required>{{ qa.answer }}</textarea>

    <button type="button" onclick="this.parentElement.remove()">❌ Remove</button>
</div>
{% endfor %}


{% endif %}

</div>

<button type="button" onclick="addQA()">➕ Add More Question</button>

<label>Video Link</label> <input type="text" name="video_link" value="{{ note.video_link }}">

{% if note.pdf_file %}

<p>Current PDF:</p>
<a href="/static/uploads/{{ note.pdf_file }}" target="_blank">
📄 View PDF
</a>
{% endif %}

<label>Replace PDF</label> <input type="file" name="pdf_file">

<button type="submit">Update Note</button>

</form>

</div>

</div>

<script>
function addQA(){
    let div = document.createElement("div");
    div.classList.add("qa-item");

    div.innerHTML =
        <label>Question</label>
        <textarea name="question[]" placeholder="Enter Question"></textarea>


    <label>Answer</label>
    <textarea name="answer[]" placeholder="Enter Answer"></textarea>

    <button type="button" onclick="this.parentElement.remove()">❌ Remove</button>


document.getElementById("qa-container").appendChild(div);


} </script>

</body>
</html>
