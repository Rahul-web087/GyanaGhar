<!DOCTYPE html>
<html>
<head>

<title>Chapters - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:#ffffff;
animation:fadeIn 0.5s ease;
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:30px;
}

.logo h2{
font-size:16px;
font-weight:500;
}

.navbar a{
color:#ddd;
text-decoration:none;
margin-left:12px;
font-size:13px;
transition:0.2s;
}

.navbar a:hover{
color:#ffffff;
}

/* CONTAINER */

.container{
width:95%;
max-width:1000px;
margin:auto;
padding:20px 0 80px; /*  bottom space */
}

/* TITLE */

.section-title{
font-size:20px;
font-weight:500;
margin-bottom:20px;
color:#f1f1f1;
}

/* GRID */

.chapter-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* CARD */

.chapter-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:12px;
transition:all 0.25s ease;
opacity:0;
transform:translateY(15px);
animation:cardFade 0.4s ease forwards;
}

.chapter-card:nth-child(1){animation-delay:0.05s;}
.chapter-card:nth-child(2){animation-delay:0.1s;}
.chapter-card:nth-child(3){animation-delay:0.15s;}
.chapter-card:nth-child(4){animation-delay:0.2s;}
.chapter-card:nth-child(5){animation-delay:0.25s;}

@keyframes cardFade{
to{
opacity:1;
transform:translateY(0);
}
}

.chapter-card:hover{
transform:translateY(-4px);
border-color:rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
}

/* TEXT */

.chapter-card h3{
font-size:14px;
font-weight:500;
margin-bottom:10px;
color:#ffffff;
}

/* BUTTON */

.chapter-btn{
display:block;
text-align:center;
padding:8px;
border-radius:6px;
font-size:13px;
text-decoration:none;
background:#ff4d4d;
color:white;
transition:0.2s;
}

.chapter-btn:hover{
background:#e60000;
}

.chapter-btn:active{
transform:scale(0.96);
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:20px;
padding:8px 16px;
font-size:13px;
background:#ff4d4d;
border-radius:6px;
text-decoration:none;
color:white;
transition:0.2s;
}

.back:hover{
background:#e60000;
}

.back:active{
transform:scale(0.96);
}

/*  LEGAL LINE */

.legal{
text-align:center;
font-size:12px;
color:#888;
margin-top:20px;
}

.legal a{
color:#ff4d4d;
text-decoration:none;
}

/* FOOTER */

footer{
margin-top:20px;
padding:15px;
text-align:center;
font-size:12px;
color:#aaa;
border-top:1px solid rgba(255,255,255,0.08);
}

footer a{
color:#ff4d4d;
text-decoration:none;
margin:0 6px;
}

/* MOBILE */

@media(max-width:600px){

.section-title{
font-size:18px;
}

.chapter-card{
padding:14px;
}

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
<img src="{{ url_for('static', filename='gyanagharlogo.png') }}">
<h2>GyanaGhar</h2>
</div>

<div>
<a href="/dashboard">Home</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>
</div>

</div>

<div class="container">

<h2 class="section-title">Chapters</h2>

<div class="chapter-grid">

{% for chapter in chapters %}

<div class="chapter-card">

<h3>{{ chapter.name }}</h3>

<a class="chapter-btn" href="/chapter/{{ chapter.id }}">
Open Chapter
</a>

</div>

{% endfor %}

</div>

<a class="back" href="/dashboard">Back to Dashboard</a>




</div>
<p>
    By using this app, you agree to
<a href="/terms">Terms</a> &
<a href="/privacy-policy">Privacy Policy</a>

</p>
<footer>


    <p>
<a href="/privacy-policy">Privacy Policy</a> |
<a href="/terms">Terms</a> |
<a href="/about">About</a> |
<a href="/disclaimer">Disclaimer</a></p>

<p>© 2026 GyanaGhar</p>

</footer>

</body>
</html>
