<!DOCTYPE html>
<html>
<head>

<title>Notes - GyanaGhar</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>

<div class="navbar">

<h1>GyanaGhar 🎓</h1>

<div>

<a href="/dashboard">Home</a>

<a href="/logout">Logout</a>

</div>

</div>



<div class="container">

<h3>📚 Chapter Notes</h3>


{% if note %}


<!-- NOTE CONTENT -->

<div style="text-align:left; background:white; padding:20px; border-radius:10px;">

{{ note.content | safe }}

</div>


<br>


<!-- VIDEO -->

{% if note.video_link %}

<h3>🎥 Video Lecture</h3>

<iframe width="100%" height="400"

src="{{ note.video_link }}"

frameborder="0"

allowfullscreen>

</iframe>

<br><br>

{% endif %}


<!-- PDF -->

{% if note.pdf_file %}

<h3>📄 PDF Notes</h3>

<a href="{{ note.pdf_file }}" target="_blank">

Download PDF

</a>

{% endif %}



{% else %}

<p>No notes available yet.</p>

{% endif %}


<br>

<a href="javascript:history.back()">⬅ Back</a>

</div>


</body>
</html>
