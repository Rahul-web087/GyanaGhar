<!DOCTYPE html>
<html>
<head>
    <title>Login - GyanaGhar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .login-card h2 {
            text-align: center;
            color: #2a5298;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .input-group label {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #999;
            font-size: 14px;
            transition: 0.3s;
            pointer-events: none;
            background: white;
            padding: 0 5px;
        }

        .input-group input:focus + label,
        .input-group input:valid + label {
            top: -8px;
            font-size: 12px;
            color: #2a5298;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .links {
            margin-top: 15px;
            text-align: center;
        }

        .links a {
            text-decoration: none;
            font-weight: bold;
            color: #2a5298;
        }

        /* PREMIUM FOOTER */

        .premium-footer {
            position: relative;
            background: rgba(30, 60, 114, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding-top: 60px;
            padding-bottom: 20px;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            top: -40px;
            left: 0;
            width: 200%;
            height: 80px;
            background: radial-gradient(circle at 50% 0%, #ffffff33 20%, transparent 70%);
            animation: waveMove 6s linear infinite;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .social-icons a {
            margin: 0 10px;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover {
            transform: scale(1.3);
        }

        @media (max-width: 768px) {
            .login-card {
                width: 90%;
            }
        }

    </style>
</head>

<body>

<div class="main-content">
    <div class="login-card">
        <h2>Welcome Back 👋</h2>

        <form method="POST">

            <div class="input-group">
                <input type="email" name="email" required>
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" id="password" required>
                <label>Password</label>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="links">
            <p><a href="/forgot_password">Forgot Password?</a></p>
            <p>Don't have an account? <a href="/register">Register</a></p>
        </div>

    </div>
</div>

<footer class="premium-footer">
    <div class="wave"></div>

    <h3>GyanaGhar 🎓</h3>
    <p>Empowering Students with Smart Learning</p>



    <p>Contact: support@gyanaghar.com</p>
    <p>© 2026 GyanaGhar | Built by Rahul Nayak </p>
</footer>

<script>
function togglePassword() {
    var passwordField = document.getElementById("password");
    passwordField.type = passwordField.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
