



<!DOCTYPE html>
<html>
<head>

<title>Chapters - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#1e3c72;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

/* MAIN */

.container{
width:90%;
margin:auto;
margin-top:40px;
text-align:center;
}

/* TITLE */

.section-title{
font-size:24px;
margin-bottom:30px;
}

/* CHAPTER GRID */

.chapter-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CHAPTER CARD */

.chapter-card{
background:white;
color:#333;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.chapter-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.chapter-card h3{
margin-bottom:10px;
}

.chapter-btn{
display:inline-block;
padding:10px 20px;
background:#2a5298;
color:white;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.chapter-btn:hover{
background:#1e3c72;
}

/* BACK BUTTON */

.back{
margin-top:40px;
display:inline-block;
color:white;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:70px;
padding:20px;
background:#1e3c72;
text-align:center;
}

</style>

</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">

<img src="{{ url_for('static', filename='gyanagharlogo.png') }}">

<h2>GyanaGhar</h2>

</div>

<div>

<a href="/dashboard">Home</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>

</div>

</div>



<div class="container">

<h2 class="section-title">📖 Chapters</h2>

<div class="chapter-grid">

{% for chapter in chapters %}

<div class="chapter-card">

<h3>{{ chapter.name }}</h3>

<a class="chapter-btn" href="/chapter/{{ chapter.id }}">
Open Chapter
</a>

</div>

{% endfor %}

</div>


<br>

<a class="back" href="/dashboard">⬅ Back to Dashboard</a>

</div>


<footer>
© 2026 GyanaGhar | Built by Rahul Nayak
</footer>

</body>
</html>
