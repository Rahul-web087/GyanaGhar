<!DOCTYPE html>
<html>
<head>
    <title>Add Note</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="navbar">
    <h1>Add Note - Admin</h1>
    <a href="/logout">Logout</a>
</div>

<div class="container">
    <h3>Add New Note</h3>

 <form method="POST" enctype="multipart/form-data">

    <input type="number" name="class_num" placeholder="Class Number" required><br><br>

    <input type="text" name="subject" placeholder="Subject" required><br><br>

    <input type="text" name="chapter" placeholder="Chapter Name" required><br><br>

    <input type="text" name="video_link" placeholder="YouTube Embed Link"><br><br>

    <input type="file" name="pdf_file" accept="application/pdf"><br><br>

    <textarea name="content" placeholder="HTML Note Content" rows="6" style="width:90%;" required></textarea><br><br>

    <button type="submit">Add Note</button>

</form>
</div>

</body>
</html>
