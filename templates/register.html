<!DOCTYPE html>
<html>
<head>
    <title>Register - GyanaGhar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            background: white;
            padding: 40px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .register-card h2 {
            text-align: center;
            color: #2a5298;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .input-group label {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #999;
            font-size: 14px;
            transition: 0.3s;
            pointer-events: none;
            background: white;
            padding: 0 5px;
        }

        .input-group input:focus + label,
        .input-group input:valid + label {
            top: -8px;
            font-size: 12px;
            color: #2a5298;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        #strength-message {
            font-size: 13px;
            margin-bottom: 10px;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #2a5298;
            font-weight: bold;
            text-decoration: none;
        }

        /* 🔥 LEGAL TEXT */
        .legal-text {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            color: #555;
        }

        .legal-text a {
            color: #2a5298;
            text-decoration: none;
            margin: 0 3px;
        }

        /* FOOTER */
        .premium-footer {
            position: relative;
            background: rgba(30, 60, 114, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding-top: 60px;
            padding-bottom: 20px;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            top: -40px;
            left: 0;
            width: 200%;
            height: 80px;
            background: radial-gradient(circle at 50% 0%, #ffffff33 20%, transparent 70%);
            animation: waveMove 6s linear infinite;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        footer a {
            color: #ffcc00;
            text-decoration: none;
            margin: 0 6px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .register-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<div class="main-content">
    <div class="register-card">
        <h2>Create Account</h2>

        <form method="POST">

            <div class="input-group">
                <input type="text" name="name" required>
                <label>Full Name</label>
            </div>

            <div class="input-group">
                <input type="email" name="email" required>
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" id="password" required onkeyup="checkStrength()">
                <label>Password</label>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <div id="strength-message"></div>

            <div class="input-group">
                <select name="secret_question" required>
                    <option value="">Select Secret Question</option>
                    <option>Your first school name?</option>
                    <option>Your favorite teacher?</option>
                    <option>Your childhood nickname?</option>
                </select>
            </div>

            <div class="input-group">
                <input type="text" name="secret_answer" required>
                <label>Secret Answer</label>
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login">Login</a>
        </div>

        <!-- 🔥 LEGAL LINE -->
        <div class="legal-text">
            By registering, you agree to
            <a href="/terms">Terms</a> &
            <a href="/privacy-policy">Privacy Policy</a>
        </div>

    </div>
</div>

<footer class="premium-footer">
    <div class="wave"></div>

    <h3>GyanaGhar 🎓</h3>
    <p>Empowering Students with Smart Learning</p>

    <!-- 🔥 LEGAL LINKS -->
    <p>
        <a href="/privacy-policy">Privacy Policy</a> |
        <a href="/terms">Terms</a> |
        <a href="/about">About</a> |
        <a href="/disclaimer">Disclaimer</a>
    </p>

    <p>Contact: support@gyanaghar.com</p>
    <p>© 2026 GyanaGhar | Built by Rahul Nayak</p>
</footer>

<script>
function togglePassword() {
    var passwordField = document.getElementById("password");
    passwordField.type = passwordField.type === "password" ? "text" : "password";
}

function checkStrength() {
    var password = document.getElementById("password").value;
    var strengthMsg = document.getElementById("strength-message");

    if (password.length < 6) {
        strengthMsg.innerHTML = "Weak password";
        strengthMsg.style.color = "red";
    } else if (password.match(/[A-Z]/) && password.match(/[0-9]/)) {
        strengthMsg.innerHTML = "Strong password";
        strengthMsg.style.color = "green";
    } else {
        strengthMsg.innerHTML = "Medium password";
        strengthMsg.style.color = "orange";
    }
}
</script>

</body>
</html>
