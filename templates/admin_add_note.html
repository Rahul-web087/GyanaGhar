{% extends "base.html" %}

{% block content %}

<style>
.form-box{
    background: linear-gradient(145deg, #1a1a1a, #121212);
    padding:25px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s ease;
}

h3{
    text-align:center;
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:10px;
    color:#ccc;
}

.form-box input,
.form-box select,
.form-box textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #333;
    border-radius:8px;
    background:#1a1a1a;
    color:white;
}

.form-box textarea{
    resize:vertical;
    min-height:80px;
}

.form-box input:focus,
.form-box select:focus,
.form-box textarea:focus{
    outline:none;
    border:1px solid #ff4d4d;
    box-shadow:0 0 5px #ff4d4d;
}

.form-box button{
    margin-top:12px;
    padding:12px;
    width:100%;
    border-radius:10px;
    background: linear-gradient(45deg, #ff4d4d, #ff0000);
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    transform:scale(1.05);
}

.qa-item{
    margin-top:10px;
    background:#151515;
    padding:10px;
    border-radius:10px;
}

.remove-btn{
    background:#444;
    margin-top:5px;
}

.remove-btn:hover{
    background:#ff0000;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity:0;
        transform:translateY(30px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}
</style>

<div class="container">

<h3>📝 Add New Note</h3>

<div class="form-box">

<form method="POST" enctype="multipart/form-data">

<!-- Class -->
<label>Select Class</label>
<select id="classSelect">
<option value="">Select Class</option>
{% for c in classes %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>

<!-- Subject -->
<label>Select Subject</label>
<select id="subjectSelect">
<option value="">Select Subject</option>
{% for s in subjects %}
<option value="{{ s.id }}" data-class="{{ s.class_id }}">
{{ s.name }}
</option>
{% endfor %}
</select>

<!-- Chapter -->
<label>Select Chapter</label>
<select name="chapter_id" id="chapterSelect" required>
<option value="">Select Chapter</option>
{% for ch in chapters %}
<option value="{{ ch.id }}" data-subject="{{ ch.subject_id }}">
{{ ch.name }}
</option>
{% endfor %}
</select>

<label>Note Title</label>
<input type="text" name="title" placeholder="Enter Note Title" required>

<!-- Q&A -->
<div id="qa-container">

<div class="qa-item">
<textarea name="question[]" placeholder="Enter Question" required></textarea>
<textarea name="answer[]" placeholder="Enter Answer" required></textarea>
</div>

</div>

<button type="button" onclick="addQA()">➕ Add More Q&A</button>

<label>YouTube Video Link</label>
<input type="text" name="video_link" placeholder="Paste embed link (optional)">

<label>Upload PDF</label>
<input type="file" name="pdf_file">

<button type="submit">Add Note</button>

</form>

</div>

</div>

<footer class="footer">
© 2026 GyanaGhar | Built by Rahul Nayak
</footer>

<!-- JS -->
<script>
function addQA() {
    var container = document.getElementById("qa-container");

    var div = document.createElement("div");
    div.className = "qa-item";

    div.innerHTML =
        '<textarea name="question[]" placeholder="Enter Question" required></textarea>' +
        '<textarea name="answer[]" placeholder="Enter Answer" required></textarea>' +
        '<button type="button" class="remove-btn" onclick="this.parentElement.remove()">❌ Remove</button>';

    container.appendChild(div);
}
</script>

<!-- FILTER -->
<script>
const classSelect = document.getElementById("classSelect");
const subjectSelect = document.getElementById("subjectSelect");
const chapterSelect = document.getElementById("chapterSelect");

classSelect.addEventListener("change", function () {
    let classId = this.value;

    for (let option of subjectSelect.options) {
        if (option.dataset.class == classId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }

    subjectSelect.value = "";
    chapterSelect.value = "";
});

subjectSelect.addEventListener("change", function () {
    let subjectId = this.value;

    for (let option of chapterSelect.options) {
        if (option.dataset.subject == subjectId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }

    chapterSelect.value = "";
});
</script>

{% endblock %}
