<!DOCTYPE html>
<html>
<head>

<title>Edit Chapter - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#1e3c72;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
width:90%;
max-width:500px;
margin:auto;
margin-top:60px;
}

.card{
background:white;
color:#333;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

input,select{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="navbar">
<h2>GyanaGhar</h2>

<div>
<a href="/dashboard">Home</a>
<a href="/logout">Logout</a>
</div>
</div>

<div class="container">

<div class="card">

<h2>✏ Edit Chapter</h2>

<form method="POST">

<!-- Class -->

<select name="class_id" required>

{% for c in classes %}

<option value="{{ c.id }}"

{% if c.id == current_class_id %} selected {% endif %}

>

{{ c.name }}

</option>

{% endfor %}

</select>


<!-- Subject -->

<select name="subject_id" required>

{% for s in subjects %}

<option value="{{ s.id }}"

{% if s.id == chapter.subject_id %} selected {% endif %}

>

{{ s.name }}

</option>

{% endfor %}

</select>


<!-- Chapter Name -->

<input type="text" name="name" value="{{ chapter.name }}" required>


<button type="submit">

Update Chapter

</button>

</form>

</div>

</div>

</body>
</html>
