{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>👨‍ Manage Users</h2>

<input type="text" id="search" placeholder="Search email..." onkeyup="searchUser()">

<br><br>

<table style="width:100%">
<tr>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
</tr>

{% for user in users %}
<tr class="user-row">
    <td>{{ user.email }}</td>
    <td>{{ user.role }}</td>
    <td>

        {% if user.role != "admin" %}
        <form method="POST" action="/admin/delete_user/{{ user.id }}">
            <button onclick="return confirm('Delete this user?')">
                🗑 Delete
            </button>
        </form>
        {% else %}
        Admin
        {% endif %}

    </td>
</tr>
{% endfor %}

</table>

</div>

<script>
function searchUser() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll(".user-row");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
</script>

{% endblock %}
