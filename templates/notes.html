<!DOCTYPE html>
<html>
<head>
    <title>Notes - GyanaGhar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="navbar">
    <h1>GyanaGhar 🎓</h1>
    <div>
        <a href="/dashboard">Home</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h3>Class {{ class_num }} - {{ subject }}</h3>
    <h4>{{ chapter }}</h4>

    <hr>

    <div style="text-align:left;">
        {{ notes | safe }}
    </div>

    <!--  VIDEO SECTION -->
    {% if video_link %}
        <h4 style="margin-top:20px;"> Video Lecture:</h4>
        <iframe width="100%" height="400"
            src="{{ video_link }}"
            frameborder="0"
            allowfullscreen>
        </iframe>
    {% endif %}

    <!--  PDF SECTION -->
    {% if pdf_file %}
        <h4 style="margin-top:20px;"> PDF Preview:</h4>
        <iframe src="{{ url_for('uploaded_file', filename=pdf_file) }}"
                width="100%"
                height="500px">
        </iframe>
    {% endif %}

    <br>
    <a href="/class/{{ class_num }}/{{ subject }}">⬅ Back</a>
</div>

</body>
</html>
