<!DOCTYPE html>

<html>
<head>
<title>Add Note</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.form-box{
background:white;
padding:25px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-box input,
.form-box select,
.form-box textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.form-box button{
margin-top:15px;
padding:10px;
width:100%;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.form-box button:hover{
background:#0056b3;
}

.qa-item{
margin-top:10px;
}
</style>

</head>

<body>

<div class="navbar">
<h1>Add Note - Admin</h1>
<a href="/dashboard">Dashboard</a>
<a href="/logout">Logout</a>
</div>

<div class="container">

<h3 style="text-align:center;">Add New Note</h3>

<div class="form-box">

<form method="POST" enctype="multipart/form-data">

<!-- Class -->

<label>Select Class</label> <select id="classSelect">

<option value="">Select Class</option>
{% for c in classes %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>

<!-- Subject -->

<label>Select Subject</label> <select id="subjectSelect">

<option value="">Select Subject</option>
{% for s in subjects %}
<option value="{{ s.id }}" data-class="{{ s.class_id }}">
{{ s.name }}
</option>
{% endfor %}
</select>

<!-- Chapter -->

<label>Select Chapter</label> <select name="chapter_id" id="chapterSelect" required>

<option value="">Select Chapter</option>
{% for ch in chapters %}
<option value="{{ ch.id }}" data-subject="{{ ch.subject_id }}">
{{ ch.name }}
</option>
{% endfor %}
</select>

<label>Note Title</label> <input type="text" name="title" placeholder="Enter Note Title" required>

<!-- MULTIPLE Q&A -->

<div id="qa-container">

<div class="qa-item">
<textarea name="question[]" placeholder="Enter Question" required></textarea>
<textarea name="answer[]" placeholder="Enter Answer" required></textarea>
</div>

</div>

<button type="button" onclick="addQA()">➕ Add More Q&A</button>

<label>YouTube Video Link</label> <input type="text" name="video_link" placeholder="Paste embed link (optional)">

<label>Upload PDF</label> <input type="file" name="pdf_file">

<button type="submit">Add Note</button>

</form>

</div>

</div>

<!-- JS -->

<script>
function addQA() {
    let container = document.getElementById("qa-container");

    let div = document.createElement("div");
    div.classList.add("qa-item");

    div.innerHTML = `
        <textarea name="question[]" placeholder="Enter Question" required></textarea>

```
    <textarea name="answer[]" placeholder="Enter Answer" required></textarea>
`;

container.appendChild(div);
```

} </script>

<!-- Filter Script -->

<script>
const classSelect = document.getElementById("classSelect");
const subjectSelect = document.getElementById("subjectSelect");
const chapterSelect = document.getElementById("chapterSelect");

classSelect.addEventListener("change", function () {
    let classId = this.value;

    for (let option of subjectSelect.options) {
        if (option.dataset.class == classId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }

    subjectSelect.value = "";
    chapterSelect.value = "";
});

subjectSelect.addEventListener("change", function () {
    let subjectId = this.value;

    for (let option of chapterSelect.options) {
        if (option.dataset.subject == subjectId || option.value == "") {
            option.style.display = "block";
        } else {
            option.style.display = "none";
        }
    }

    chapterSelect.value = "";
});
</script>

</body>
</html>
