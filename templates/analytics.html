<!DOCTYPE html>
<html>
<head>

<title>Admin Analytics - GyanaGhar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}

.navbar a:hover{
color:#ff4d4d;
}


/* CONTAINER */

.container{
width:90%;
margin:auto;
margin-top:40px;
text-align:center;
}


/* GRID */

.stats-grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}


/* CARD */

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
background:rgba(255,0,0,0.2);
}

.card h2{
margin:10px 0;
font-size:36px;
color:#ff4d4d;
}

.card p{
font-size:16px;
color:#ccc;
}


/* CHART */

.chart-container{
margin-top:50px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
}

/* FOOTER */

footer{
margin-top:60px;
padding:20px;
background:rgba(255,255,255,0.05);
text-align:center;
}

</style>

</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<h2>📊 GyanaGhar Admin</h2>

<div>
<a href="/dashboard">Dashboard</a>
<a href="/logout">Logout</a>
</div>

</div>



<div class="container">

<h1>📊 Platform Analytics</h1>

<p>Overview of your learning platform 🚀</p>


<!-- STATS -->

<div class="stats-grid">

<div class="card">
<h2>{{ users }}</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2>{{ classes }}</h2>
<p>Total Classes</p>
</div>

<div class="card">
<h2>{{ subjects }}</h2>
<p>Total Subjects</p>
</div>

<div class="card">
<h2>{{ chapters }}</h2>
<p>Total Chapters</p>
</div>

<div class="card">
<h2>{{ notes }}</h2>
<p>Total Notes</p>
</div>

</div>


<!-- CHART -->

<div class="chart-container">

<canvas id="analyticsChart"></canvas>

</div>

</div>


<footer>
© 2026 GyanaGhar | Built by Rahul Nayak
</footer>


<script>

const ctx = document.getElementById('analyticsChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Users', 'Classes', 'Subjects', 'Chapters', 'Notes'],
        datasets: [{
            label: 'Platform Data',
            data: [{{ users }}, {{ classes }}, {{ subjects }}, {{ chapters }}, {{ notes }}],
            borderWidth: 1
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: {
                    color: 'white'
                }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        }
    }
});

</script>

</body>
</html>
