<!DOCTYPE html>

<html>
<head>
    <title>Verify OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    h2 { margin-bottom: 10px; }

    p {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 20px;
    }

    .otp-boxes {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .otp-input {
        width: 45px;
        height: 55px;
        font-size: 22px;
        text-align: center;
        border-radius: 10px;
        border: none;
        background: #0f172a;
        color: white;
    }

    .otp-input:focus {
        outline: 2px solid #ef4444;
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #ef4444;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #dc2626; }

    .success { color: #22c55e; margin-bottom: 10px; }
    .error { color: #f87171; margin-bottom: 10px; }

    .resend {
        margin-top: 10px;
        background: #22c55e;
    }

    .resend:disabled {
        background: #555;
        cursor: not-allowed;
    }
</style>

</head>

<body>

<div class="card">

<h2>Verify OTP</h2>
<p>Enter the 6-digit code sent to your email</p>

<!--  FLASH MESSAGE SUPPORT -->

{% with messages = get_flashed_messages() %}
{% if messages %} <div class="success">{{ messages[0] }}</div>
{% endif %}
{% endwith %}

{% if error %} <div class="error">{{ error }}</div>
{% endif %}

<form method="POST" id="otpForm">


<div class="otp-boxes">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">
    <input type="text" maxlength="1" class="otp-input">

</div>

<input type="hidden" name="otp" id="otpValue">

<button type="submit">Verify</button>


</form>

<form action="/resend_otp" method="POST">
    <button class="resend" id="resendBtn">Resend in 30s</button>
    <p style="font-size:13px; opacity:0.7; margin-top:10px;">
📩 Didn’t receive OTP? Check your <b>Spam / Promotions</b> folder
</p>
</form>

</div>

<script>
const inputs = document.querySelectorAll(".otp-input");
const otpValue = document.getElementById("otpValue");
const resendBtn = document.getElementById("resendBtn");

// Autofocus first box
inputs[0].focus();

// Handle typing
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        updateOTP();
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });

});

//  PASTE SUPPORT (important UX)
inputs[0].addEventListener("paste", (e) => {
    const pasteData = e.clipboardData.getData("text").slice(0,6);
    inputs.forEach((input, i) => input.value = pasteData[i] || "");
    updateOTP();
});

// Combine OTP
function updateOTP() {
    let otp = "";
    inputs.forEach(input => otp += input.value);
    otpValue.value = otp;

    if (otp.length === 6) {
        document.getElementById("otpForm").submit();
    }
}

// Timer
let time = 30;
resendBtn.disabled = true;

const countdown = setInterval(() => {
    time--;
    resendBtn.innerText = "Resend in " + time + "s";

    if (time <= 0) {
        clearInterval(countdown);
        resendBtn.disabled = false;
        resendBtn.innerText = "Resend OTP";
    }
}, 1000);

    window.onload = function() {
    alert("OTP sent! If not found, please check your Spam or Promotions folder.");
};
</script>

</body>
</html>
