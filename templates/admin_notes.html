<!DOCTYPE html>

<html>
<head>
    <title>Manage Courses</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#2a5298;
    color:white;
}

a{
    text-decoration:none;
    display:inline-block;
    margin:3px;
    padding:5px 10px;
    border-radius:5px;
    font-size:13px;
}

.edit{
    background:#4CAF50;
    color:white;
}

.delete{
    background:#e53935;
    color:white;
}
</style>

</head>

<body>

<h2 style="text-align:center;">Manage Courses</h2>

<table>
<tr>
<th>Class</th>
<th>Subject</th>
<th>Chapter</th>
<th>Action</th>
</tr>

{% for note in notes %}

<tr>
<td>{{ note.class_num }}</td>
<td>{{ note.subject }}</td>
<td>{{ note.chapter }}</td>

<td>

<a class="edit" href="{{ url_for('edit_note', note_id=note.id) }}">
    ✏ Edit
</a>

<br>

<a class="delete"
href="/admin/delete_note/{{ note.id }}"
onclick="return confirm('Delete this note?')">
❌ Delete Note </a>

<br>

<a class="delete" href="/admin/delete_subject/{{ note.subject }}">
   ❌ Delete Subject
</a>

<br>

<a class="delete" href="/admin/delete_class/{{ note.class_num }}">
   ❌ Delete Class
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
