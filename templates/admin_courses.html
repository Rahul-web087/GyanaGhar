
<!DOCTYPE html>

<html>
<head>
<title>Manage Courses</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#eef2f7;
}

/* Navbar */
.navbar{
background:linear-gradient(90deg,#1e3c72,#2a5298);
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
}

/* Container */
.container{
width:95%;
margin:auto;
margin-top:20px;
}

/* Filters */
.filters{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.filters input, .filters select{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

/* Card */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.title{
font-weight:bold;
color:#2a5298;
}

/* Buttons */
.btn{
padding:6px 10px;
border-radius:5px;
text-decoration:none;
color:white;
font-size:12px;
display:inline-block;
margin-top:8px;
margin-right:5px;
}

.edit{ background:#3498db; }
.note{ background:#8e44ad; }
.delete{ background:#e74c3c; }

.btn:hover{
opacity:0.85;
}
</style>

</head>

<body>

<div class="navbar">
<h2> Manage Courses</h2>

<div>
<a href="/dashboard">Dashboard</a>
<a href="/logout">Logout</a>
</div>
</div>

<div class="container">

<!-- FILTERS -->

<div class="filters">
<input type="text" id="searchInput" placeholder="🔍 Search...">

<select id="classFilter">
<option value="">All Classes</option>
</select>

<select id="subjectFilter">
<option value="">All Subjects</option>
</select>
</div>

<!-- GRID -->

<div class="grid" id="courseGrid">

{% for course in courses %}

<div class="card"
data-class="{{ course.class_name }}"
data-subject="{{ course.subject_name }}"
data-chapter="{{ course.chapter_name }}">

<div class="title"> {{ course.chapter_name }}</div>

<p> {{ course.class_name }}</p>
<p> {{ course.subject_name }}</p>

<!-- Actions -->

<a class="btn edit"
href="/admin/edit_chapter/{{ course.chapter_id }}">
 Edit Chapter </a>

<br>

{% if course.note_id %} <a class="btn note"
href="{{ url_for('edit_note', note_id=course.note_id) }}">
 Edit Note </a>
{% else %} <a class="btn note"
href="/admin/add_note?chapter_id={{ course.chapter_id }}">
 Add Note </a>
{% endif %}

<br>

<a class="btn delete"
href="/admin/delete_course/{{ course.chapter_id }}"
onclick="return confirm('Delete this chapter?')">
🗑 Delete </a>

</div>

{% endfor %}

</div>

</div>

<script>

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();
    filterCards();
});

// FILTER FUNCTION
function filterCards(){
    let search = document.getElementById("searchInput").value.toLowerCase();
    let classVal = document.getElementById("classFilter").value;
    let subjectVal = document.getElementById("subjectFilter").value;

    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        let c = card.dataset.class;
        let s = card.dataset.subject;

        let show = true;

        if(search && !text.includes(search)) show = false;
        if(classVal && c !== classVal) show = false;
        if(subjectVal && s !== subjectVal) show = false;

        card.style.display = show ? "block" : "none";
    });
}

// AUTO POPULATE FILTERS
let classes = new Set();
let subjects = new Set();

document.querySelectorAll(".card").forEach(card=>{
    classes.add(card.dataset.class);
    subjects.add(card.dataset.subject);
});

let classFilter = document.getElementById("classFilter");
let subjectFilter = document.getElementById("subjectFilter");

classes.forEach(c=>{
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    classFilter.appendChild(opt);
});

subjects.forEach(s=>{
    let opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    subjectFilter.appendChild(opt);
});

classFilter.addEventListener("change", filterCards);
subjectFilter.addEventListener("change", filterCards);

</script>

</body>
</html>
