<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - GyanaGhar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            width: 360px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card h2 {
            color: #2a5298;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 12px;
            cursor: pointer;
        }

        .input-group {
            position: relative;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #2a5298;
            text-decoration: none;
            font-weight: bold;
        }

        /* LEGAL */
        .legal-text {
            font-size: 12px;
            margin-top: 10px;
            color: #555;
        }

        .legal-text a {
            color: #2a5298;
            text-decoration: none;
        }

        /* FOOTER */
        footer {
            background: rgba(30, 60, 114, 0.9);
            color: white;
            text-align: center;
            padding: 20px;
        }

        footer a {
            color: #ffcc00;
            text-decoration: none;
            margin: 0 6px;
        }

    </style>
</head>

<body>

<div class="main-content">
    <div class="card">

        <h2>Reset Password</h2>

        <form method="POST" action="/reset_password">

            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="New Password" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <button type="submit">Reset</button>

        </form>

        <div class="links">
            <a href="/login">Back to Login</a>
        </div>

        <!-- LEGAL -->
        <div class="legal-text">
            By continuing, you agree to
            <a href="/terms">Terms</a> &
            <a href="/privacy-policy">Privacy Policy</a>
        </div>

    </div>
</div>

<footer>

    <p>
        <a href="/privacy-policy">Privacy Policy</a> |
        <a href="/terms">Terms</a> |
        <a href="/about">About</a> |
        <a href="/disclaimer">Disclaimer</a>
    </p>

    <p>© 2026 GyanaGhar</p>

</footer>

<script>
function togglePassword() {
    var passwordField = document.getElementById("password");
    passwordField.type = passwordField.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
